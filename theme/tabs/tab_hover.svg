<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128">
  <defs>
    <!-- Degradado suave para hover -->
    <linearGradient id="tabHoverGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3E8FE0" />
      <stop offset="100%" stop-color="#2C6FB8" />
    </linearGradient>
  </defs>

  <!-- Fondo hover -->
  <rect x="0" y="0" width="128" height="128" fill="url(#tabHoverGrad)" />

  <!-- Borde brillante -->
  <rect x="0.5" y="0.5" width="127" height="127"
        fill="none" stroke="#5CA4F9" stroke-width="1.5" />

  <!-- Glow superior -->
  <rect x="0" y="0" width="128" height="18"
        fill="rgba(115,169,230,0.25)" />
</svg>
